<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>CKR Gestión</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --verde:#1a3a2a;--oro:#c9a050;--bg:#0f0f0f;--card:#1a1a1a;--borde:#2a2a2a;
  --texto:#f0f0f0;--sub:#888;--rojo:#d64545;--ok:#2ea84b;--azul:#3a7bd5;
}
body{background:var(--bg);color:var(--texto);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;}

/* LOCK */
#lockScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--verde);}
.lock-box{text-align:center;padding:40px 24px;}
.lock-logo{font-size:3rem;font-weight:900;color:var(--oro);letter-spacing:6px;}
.lock-sub{font-size:.72rem;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin:8px 0 32px;}
.pin-dots{display:flex;gap:16px;justify-content:center;margin-bottom:8px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:.2s;}
.pin-dot.on{background:var(--oro);border-color:var(--oro);}
.pin-err{color:#ff6b6b;font-size:.78rem;min-height:22px;margin-bottom:10px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px;justify-content:center;}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);color:#fff;font-size:1.5rem;font-weight:600;cursor:pointer;}
.pin-btn:active{background:var(--oro);color:#000;}
.pin-del{font-size:1rem;background:transparent;border-color:transparent;color:rgba(255,255,255,.4);}

/* APP */
#appMain{display:none;flex-direction:column;min-height:100vh;}
.app-header{background:var(--verde);padding:14px 18px;display:flex;align-items:center;
  position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(201,160,80,.25);}
.app-logo{font-size:1.1rem;font-weight:900;color:var(--oro);letter-spacing:3px;flex:1;}
.app-date{font-size:.7rem;color:rgba(255,255,255,.4);margin-right:10px;}
.btn-cerrar{background:none;border:none;color:rgba(255,255,255,.35);font-size:1rem;cursor:pointer;padding:4px 6px;}
.content{flex:1;overflow-y:auto;padding:16px 16px 90px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--borde);display:grid;grid-template-columns:repeat(4,1fr);z-index:200;}
.nav-btn{padding:10px 4px 8px;background:none;border:none;color:var(--sub);
  font-size:.58rem;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-icon{font-size:1.3rem;line-height:1;}
.nav-btn.active{color:var(--oro);}

/* COMPONENTES */
.sec-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--oro);
  margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--borde);}
.card{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:16px;margin-bottom:12px;}
.f{margin-bottom:13px;}
.f label{display:block;font-size:.65rem;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.f input,.f select,.f textarea{width:100%;background:#111;border:1px solid var(--borde);
  border-radius:7px;color:var(--texto);font-size:.9rem;padding:11px 13px;outline:none;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--oro);}
.f select option{background:#111;}
.f textarea{resize:vertical;min-height:65px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:block;width:100%;padding:13px;border-radius:8px;border:none;font-size:.85rem;
  font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.btn-p{background:var(--oro);color:#000;}
.btn-p:active{opacity:.8;}
.btn-s{background:transparent;border:1px solid var(--borde);color:var(--sub);}
.btn-d{background:var(--rojo);color:#fff;}
.btn-sm{display:inline-block;width:auto;padding:7px 14px;font-size:.72rem;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{flex:1;}
.empty{text-align:center;padding:36px 16px;color:var(--sub);}
.empty-icon{font-size:2.4rem;margin-bottom:10px;}
.empty p{font-size:.82rem;line-height:1.6;}

/* VENTA */
.s-wrap{position:relative;}
.s-drop{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--card);
  border:1px solid var(--oro);border-radius:8px;z-index:50;max-height:200px;overflow-y:auto;display:none;}
.s-opt{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--borde);font-size:.86rem;display:flex;align-items:center;gap:9px;}
.s-opt:last-child{border-bottom:none;}
.s-opt:active{background:rgba(201,160,80,.1);}
.s-name{font-weight:600;}.s-meta{font-size:.7rem;color:var(--sub);}
.s-thumb{width:38px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--verde);}
.s-thumb-ph{width:38px;height:38px;border-radius:6px;flex-shrink:0;background:rgba(201,160,80,.08);
  border:1px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:1rem;}
.sale-list{margin-bottom:14px;}
.sale-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--borde);}
.sale-row:last-child{border-bottom:none;}
.sr-info{flex:1;}.sr-nm{font-size:.87rem;font-weight:600;}.sr-tl{font-size:.7rem;color:var(--sub);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-b{width:26px;height:26px;border-radius:50%;border:1px solid var(--borde);
  background:transparent;color:var(--texto);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-n{min-width:18px;text-align:center;font-size:.85rem;}
.sr-p{font-size:.85rem;color:var(--oro);min-width:68px;text-align:right;}
.sr-del{background:none;border:none;color:var(--rojo);font-size:1.2rem;cursor:pointer;}
.total-bar{background:rgba(201,160,80,.08);border:1px solid rgba(201,160,80,.2);border-radius:8px;
  padding:13px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-lbl{font-size:.65rem;color:var(--sub);letter-spacing:1px;text-transform:uppercase;}
.total-val{font-size:1.5rem;font-weight:800;color:var(--oro);}

/* INVENTARIO */
.inv-row{background:var(--card);border:1px solid var(--borde);border-radius:10px;
  padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px;}
.inv-row:active{border-color:var(--oro);}
.inv-row.out{opacity:.5;}
.inv-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--verde);}
.inv-thumb-ph{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:rgba(201,160,80,.08);
  border:1px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.inv-main{flex:1;}
.inv-nm{font-size:.9rem;font-weight:700;}.inv-mt{font-size:.7rem;color:var(--sub);margin-top:2px;}
.inv-right{text-align:right;flex-shrink:0;}
.inv-p{font-size:.95rem;font-weight:700;color:var(--oro);}
.badge{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:20px;margin-top:3px;}
.badge-ok{background:rgba(46,168,75,.15);color:var(--ok);}
.badge-no{background:rgba(214,69,69,.15);color:var(--rojo);}
.filtros{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;scrollbar-width:none;}
.filtros::-webkit-scrollbar{display:none;}
.fil-btn{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--borde);
  background:transparent;color:var(--sub);font-size:.7rem;cursor:pointer;white-space:nowrap;}
.fil-btn.active{background:var(--oro);color:#000;border-color:var(--oro);}

/* CLIENTES */
.cli-row{background:var(--card);border:1px solid var(--borde);border-radius:10px;
  padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;}
.cli-row:active{border-color:var(--oro);}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--verde);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--oro);}
.cli-nm{font-size:.9rem;font-weight:700;}.cli-sub{font-size:.72rem;color:var(--sub);}
.cli-stat{font-size:.68rem;color:var(--oro);margin-top:2px;}

/* CONTABILIDAD */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:13px;}
.kpi-l{font-size:.6rem;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.kpi-v{font-size:1.25rem;font-weight:800;}
.kpi-v.g{color:var(--ok);}.kpi-v.r{color:var(--rojo);}.kpi-v.o{color:var(--oro);}.kpi-v.b{color:var(--azul);}
.period-tabs{display:flex;gap:6px;margin-bottom:14px;}
.ptab{flex:1;padding:7px;text-align:center;border-radius:8px;border:1px solid var(--borde);
  background:transparent;color:var(--sub);font-size:.7rem;cursor:pointer;}
.ptab.active{background:var(--verde);color:var(--oro);border-color:var(--oro);}
.mov-row{display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--borde);font-size:.83rem;}
.mov-row:last-child{border-bottom:none;}
.mov-lbl{font-size:.68rem;color:var(--sub);}
.mov-met{font-size:.65rem;padding:2px 7px;border-radius:20px;background:rgba(201,160,80,.1);color:var(--oro);}
.mov-val{font-weight:700;}.mv-g{color:var(--ok);}.mv-r{color:var(--rojo);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:400;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:18px 18px 0 0;padding:22px 18px 42px;
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-hd{font-size:.98rem;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.modal-x{background:none;border:none;color:var(--sub);font-size:1.4rem;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);
  background:var(--ok);color:#fff;padding:11px 22px;border-radius:8px;
  font-size:.82rem;font-weight:600;z-index:1000;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.toast.err{background:var(--rojo);}
.btn-etq{background:none;border:1px solid var(--borde);border-radius:6px;color:var(--oro);
  font-size:.9rem;padding:5px 9px;cursor:pointer;flex-shrink:0;line-height:1;}
.btn-etq:active{background:rgba(201,160,80,.15);}
#qrReader{border-radius:8px;overflow:hidden;}
#qrReader video{border-radius:8px;}
</style>
</head>
<body>

<!-- ========== PANTALLA PIN ========== -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">CKR</div>
    <div class="lock-sub">Gestión de Tienda</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pp('1')">1</button>
      <button class="pin-btn" onclick="pp('2')">2</button>
      <button class="pin-btn" onclick="pp('3')">3</button>
      <button class="pin-btn" onclick="pp('4')">4</button>
      <button class="pin-btn" onclick="pp('5')">5</button>
      <button class="pin-btn" onclick="pp('6')">6</button>
      <button class="pin-btn" onclick="pp('7')">7</button>
      <button class="pin-btn" onclick="pp('8')">8</button>
      <button class="pin-btn" onclick="pp('9')">9</button>
      <button class="pin-btn pin-del" onclick="pp('⌫')">⌫</button>
      <button class="pin-btn" onclick="pp('0')">0</button>
      <button class="pin-btn pin-del" onclick="pp('✕')">✕</button>
    </div>
  </div>
</div>

<!-- ========== APP ========== -->
<div id="appMain">
  <header class="app-header">
    <span class="app-logo">CKR</span>
    <span class="app-date" id="appDate"></span>
    <button class="btn-cerrar" onclick="cerrar()" title="Bloquear">🔒</button>
  </header>
  <div class="content" id="content"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nb-venta"       onclick="ir('venta')">      <span class="nav-icon">💰</span>Venta</button>
    <button class="nav-btn"        id="nb-inventario"  onclick="ir('inventario')"> <span class="nav-icon">📦</span>Inventario</button>
    <button class="nav-btn"        id="nb-clientes"    onclick="ir('clientes')">   <span class="nav-icon">👥</span>Clientes</button>
    <button class="nav-btn"        id="nb-contabilidad"onclick="ir('contabilidad')"><span class="nav-icon">📊</span>Cuentas</button>
  </nav>
</div>

<!-- ========== MODAL ========== -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modalBody"></div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>

<script>
// ================================================
// CKR GESTIÓN v2  —  PIN por defecto: 1234
// ================================================
var PIN_CORRECTO = '1234';
var pinActual = '';
var seccion = 'venta';
var periodo = 'hoy';
var ventaCarrito = [];
var filtroInv = 'Todos';
var filtroCliSaldo = false;
var filtroGasto = 'Todos';
var CKR_STOCK_WEBHOOK = 'https://script.google.com/macros/s/AKfycbwg9Exn5g-aEe3hpP3-MCHZz-mAUKXYve_FU1Sha7xwSbhLy7B6eWnvf1XrcrF29bs/exec';

// ---- CATEGORIAS DE GASTOS (negocio vs personal) ----
var CAT_NEGOCIO = ['Arriendo','Mercancía','Transporte / Envío','Publicidad','Empaque','Comisión','Servicios','Otro','Celular','Consumo Carro','Shein','Temu','Ludys','Cuavas','Envíos','Apple'];
var CAT_PERSONAL = ['Verduras','Carnes','Salida a Comer','Cumple Gaby','Zapatos','Arreglo Vestido','Gym','Creatina','Netflix','Anastasia','Drogas','Impuestos Gobierno','Pastillas','Chance','Uñas','Bolsas','Solventa','Inyección','Pelo','Madre','Seguro','Taty','Andreina','Tarjeta Éxito','Mamá','Sandalias','Concierto','Ofrenda'];
function esGastoNegocio(cat) { return CAT_NEGOCIO.indexOf(cat)>=0; }

// ---- DB ----
var DB = 'ckr_g2';
function db() {
  try { return JSON.parse(localStorage.getItem(DB)) || base(); } catch(e){ return base(); }
}
function base() { return {clientes:[],inventario:[],ventas:[],gastos:[]}; }
function guardar(d) { localStorage.setItem(DB, JSON.stringify(d)); sincronizarNube(d); }

// ---- RESPALDO EN LA NUBE (Drive, via el mismo backend de Apps Script) ----
function sincronizarNube(d) {
  if (!CKR_STOCK_WEBHOOK) return;
  fetch(CKR_STOCK_WEBHOOK, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ accion: 'guardar_backup', datos: JSON.stringify(d) }).toString()
  }).then(function(){
    localStorage.setItem('ckr_g2_ultimo_sync', Date.now().toString());
  }).catch(function(){});
}

// Trae el respaldo de la nube (JSONP — evita problemas de CORS con Apps Script).
// Si la nube tiene igual o mas ventas que el navegador actual, reemplaza los
// datos locales — esto es lo que evita que se pierdan ventas al entrar desde
// otro celular/navegador con localStorage vacio.
function cargarBackupNube(onDone) {
  if (!CKR_STOCK_WEBHOOK) { onDone(false); return; }
  var cbName = 'ckrBackupCb' + Date.now();
  var terminado = false;
  var script = document.createElement('script');
  function finalizar(restaurado) {
    if (terminado) return;
    terminado = true;
    clearTimeout(timeoutId);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    onDone(restaurado);
  }
  var timeoutId = setTimeout(function(){ finalizar(false); }, 8000);
  window[cbName] = function(resp) {
    var local = db();
    if (resp && resp.datos && (resp.datos.ventas||[]).length >= (local.ventas||[]).length) {
      localStorage.setItem(DB, JSON.stringify(resp.datos));
      finalizar(true);
    } else {
      finalizar(false);
    }
  };
  script.src = CKR_STOCK_WEBHOOK + '?accion=cargar_backup&callback=' + cbName;
  script.onerror = function(){ finalizar(false); };
  document.body.appendChild(script);
}
var uidSeq=0;
function uid(p) { uidSeq++; return p+Date.now().toString(36).toUpperCase()+'-'+uidSeq.toString(36)+Math.random().toString(36).slice(2,6).toUpperCase(); }

// Corrige IDs duplicados generados antes del fix de uid() (colisionaban por
// usar solo Date.now(), asi que varios clientes/productos podian compartir
// el mismo id y al abrir uno se mostraba otro distinto con el mismo id).
function repararIdsDuplicados() {
  var d=db();var cambios=0;
  var vistos={};
  (d.clientes||[]).forEach(function(x){
    if(!x.id)return;
    if(vistos[x.id]){ x.id=uid('CLI'); cambios++; }
    else { vistos[x.id]=true; }
  });
  vistos={};
  (d.inventario||[]).forEach(function(x){
    if(!x.id)return;
    if(vistos[x.id]){ x.id=uid('PRD'); cambios++; }
    else { vistos[x.id]=true; }
  });
  vistos={};
  ['ventas','gastos'].forEach(function(col){
    (d[col]||[]).forEach(function(x){
      if(!x.id)return;
      if(vistos[x.id]){ x.id=uid(col.slice(0,3).toUpperCase()); cambios++; }
      else { vistos[x.id]=true; }
    });
  });
  // Las ventas que apuntaban a un id que ahora quedo duplicado siguen
  // apuntando al PRIMER cliente/producto que tenia ese id (no se reasignan,
  // ya que no hay forma de saber cual de los duplicados era el correcto).
  if(cambios>0) guardar(d);
  return cambios;
}

// ---- FORMATO ----
function mon(n) { return '$'+Number(n||0).toLocaleString('es-CO')+' COP'; }
function hoy() { return new Date().toISOString().slice(0,10); }
function hora() { return new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}); }
function fecStr(iso) { if(!iso)return''; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

// ---- PIN ----
function pp(v) {
  document.getElementById('pinErr').textContent = '';
  if (v==='✕') { pinActual=''; }
  else if (v==='⌫') { pinActual=pinActual.slice(0,-1); }
  else if (pinActual.length<4) { pinActual+=v; }
  // actualizar dots
  for(var i=0;i<4;i++) document.getElementById('d'+i).className='pin-dot'+(i<pinActual.length?' on':'');
  if (pinActual.length===4) {
    if (pinActual===PIN_CORRECTO) {
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('appMain').style.display='flex';
      document.getElementById('appMain').style.flexDirection='column';
      actualizarFecha();
      cargarBackupNube(function(restaurado){
        if(db().inventario.length===0) importarSitio();
        if(db().clientes.length===0) cargarClientes();
        var idsCorregidos=repararIdsDuplicados();
        if(idsCorregidos>0) toast('🔧 '+idsCorregidos+' registros con ID duplicado corregidos');
        if(restaurado) toast('☁️ Datos restaurados desde el respaldo en la nube');
        ir('venta');
      });
    } else {
      document.getElementById('pinErr').textContent='PIN incorrecto';
      pinActual='';
      for(var j=0;j<4;j++) document.getElementById('d'+j).className='pin-dot';
    }
    pinActual='';
  }
}

function cerrar() {
  document.getElementById('appMain').style.display='none';
  document.getElementById('lockScreen').style.display='flex';
  pinActual='';
  for(var i=0;i<4;i++) document.getElementById('d'+i).className='pin-dot';
}

function actualizarFecha() {
  var d=new Date();
  var dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mes=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('appDate').textContent=dias[d.getDay()]+' '+d.getDate()+' '+mes[d.getMonth()]+' '+d.getFullYear();
}

// ---- NAVEGACIÓN ----
function ir(s) {
  seccion=s;
  ['venta','inventario','clientes','contabilidad'].forEach(function(n){
    document.getElementById('nb-'+n).className='nav-btn'+(n===s?' active':'');
  });
  var c=document.getElementById('content');
  c.innerHTML = s==='venta' ? pageVenta() :
                s==='inventario' ? pageInventario() :
                s==='clientes' ? pageClientes() :
                pageContabilidad();
  c.scrollTop=0;
  if (s === 'contabilidad') cargarPedidosPendientes();
}

// ---- TOAST ----
function toast(msg,err) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':'');

function buscarProd(q) {
  var drop=document.getElementById('sDrop');
  if(!q){drop.style.display='none';return;}
  var d=db();
  var r=d.inventario.filter(function(p){return p.stock>0&&sinTildes(p.nombre).includes(sinTildes(q));});
  if(!r.length){drop.style.display='none';return;}
  drop.innerHTML=r.map(function(p){
    var img=imgFor(p.nombre);
    return '<div class="s-opt" onclick="addCarrito(\''+p.id+'\')">'+
      (img?'<img class="s-thumb" src="'+img+'" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;s-thumb-ph&quot;>👗</div>\'"/>':'<div class="s-thumb-ph">👗</div>')+
      '<div><div class="s-name">'+p.nombre+'</div>'+
      '<div class="s-meta">Talla: '+p.talla+' · Stock: '+p.stock+' · '+mon(p.precio)+'</div></div>'+
    '</div>';
  }).join('');
  drop.style.display='block';
}

function addCarrito(id) {
  var d=db();
  var p=d.inventario.find(function(x){return x.id===id;});
  if(!p) return;
  var ex=ventaCarrito.find(function(x){return x.prodId===id;});
  if(ex){ if(ex.qty<p.stock) ex.qty++; }
  else { ventaCarrito.push({prodId:p.id,nombre:p.nombre,talla:p.talla,precio:p.precio,qty:1}); }
  document.getElementById('buscaProd').value='';
  ir('venta');
}

function cQty(i,d) {
  var dt=db();
  var pr=dt.inventario.find(function(x){return x.id===ventaCarrito[i].prodId;});
  ventaCarrito[i].qty=Math.max(1,Math.min(ventaCarrito[i].qty+d,pr?pr.stock:99));
  ir('venta');
}

function cDel(i) { ventaCarrito.splice(i,1); ir('venta'); }

function registrarVenta() {
  if(!ventaCarrito.length) return;
  var d=db();
  var total=ventaCarrito.reduce(function(s,it){return s+it.precio*it.qty;},0);
  var v={id:uid('VEN'),fecha:hoy(),hora:hora(),
    items:JSON.parse(JSON.stringify(ventaCarrito)),
    total:total,
    metodo:document.getElementById('vMet').value,
    clienteId:document.getElementById('vCli').value||null,
    notas:(document.getElementById('vNotas').value||'').trim()};
  ventaCarrito.forEach(function(it){
    var p=d.inventario.find(function(x){return x.id===it.prodId;});
    if(p) p.stock=Math.max(0,p.stock-it.qty);
  });
  d.ventas.push(v);
  if(v.clienteId){
    var c=d.clientes.find(function(x){return x.id===v.clienteId;});
    if(c){
      c.totalComprado=(c.totalComprado||0)+total;
      c.numCompras=(c.numCompras||0)+1;
      if(v.metodo==='Crédito') c.saldoPendiente=(c.saldoPendiente||0)+total;
    }
  }
  guardar(d);
  ventaCarrito=[];
  toast('✅ Venta '+v.id+' — '+mon(total));
  ir('venta');
}

function pageInventario() {

  var prods=d.inventario.filter(function(p){return filtroInv==='Todos'||p.categoria===filtroInv;});

  }).join('');
  var listHtml=prods.length ? prods.map(function(p){
    var bClass=p.stock>0?'badge-ok':'badge-no';

function modalProd(id) {

    '</div>'+

    '</div>'

function editProd(id){modalProd(id);}

function guardarProd(id) {
  var nom=(document.getElementById('pNom').value||'').trim();
  var pre=parseFloat(document.getElementById('pPre').value);
  if(!nom||!pre){toast('Nombre y precio son obligatorios',true);return;}
  var d=db();
  if(id){
    var p=d.inventario.find(function(x){return x.id===id;});
    if(p){p.nombre=nom;p.categoria=document.getElementById('pCat').value;
      p.talla=document.getElementById('pTal').value;p.precio=pre;
      p.costo=parseFloat(document.getElementById('pCos').value)||0;
      p.stock=parseInt(document.getElementById('pStk').value)||0;
      p.notas=(document.getElementById('pNot').value||'').trim();}
  } else {
    d.inventario.push({id:uid('PRD'),nombre:nom,categoria:document.getElementById('pCat').value,
      talla:document.getElementById('pTal').value,precio:pre,
      costo:parseFloat(document.getElementById('pCos').value)||0,
      stock:parseInt(document.getElementById('pStk').value)||1,
      notas:(document.getElementById('pNot').value||'').trim(),fechaIngreso:hoy()});
  }
  guardar(d);cerrarModal();toast(id?'✅ Producto actualizado':'✅ Producto agregado');ir('inventario');
}

function eliminarProd(id) {
  if(!confirm('¿Eliminar este producto del inventario?'))return;
  var d=db();d.inventario=d.inventario.filter(function(x){return x.id!==id;});
  guardar(d);cerrarModal();toast('Producto eliminado');ir('inventario');
}

function cargarClientes() {
  var d=db();var count=0;var hoyFecha=hoy();
  CLIENTES_SEED.forEach(function(nom){
    nom=nom.trim();
    if(!nom)return;
    if(d.clientes.find(function(x){return x.nombre.toLowerCase()===nom.toLowerCase();}))return;
    d.clientes.push({id:uid('CLI'),nombre:nom,telefono:'',ciudad:'',email:'',
      notas:'',numCompras:0,totalComprado:0,fechaRegistro:hoyFecha});
    count++;
  });
  guardar(d);
  return count;
}

function sinTildes(s) {
  return (s||'').toLowerCase().replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n');
}
function imgFor(nombre) {
  return IMG_MAP[sinTildes(nombre)]||null;
}

function importarSitio() {
  var d=db();var count=0;
  CATALOGO.forEach(function(p){
    if(d.inventario.find(function(x){return x.nombre===p.nombre&&x.talla===p.talla;}))return;
    d.inventario.push({id:uid('PRD'),nombre:p.nombre,categoria:p.categoria,
      talla:p.talla,precio:p.precio,costo:0,stock:1,notas:'',fechaIngreso:hoy()});
    count++;
  });
  guardar(d);
  if(count===0){toast('Ya están todos los productos cargados');return;}
  toast('✅ '+count+' productos cargados al inventario');
  ir('inventario');
}

function renderClienteList(list, hayBusqueda) {
  var conteo={};
  list.forEach(function(c){var k=(c.nombre||'').trim().toLowerCase();conteo[k]=(conteo[k]||0)+1;});
  var visto={};
  return list.length ? list.map(function(c){
    var k=(c.nombre||'').trim().toLowerCase();
    var esDup=conteo[k]>1;
    visto[k]=(visto[k]||0)+1;
    return '<div class="cli-row" onclick="verCliente(\''+c.id+'\')">'+
      '<div class="avatar">'+(c.nombre||'?').charAt(0).toUpperCase()+'</div>'+
      '<div><div class="cli-nm">'+c.nombre+(esDup?' <span style="color:var(--oro);font-size:.72rem">('+visto[k]+' de '+conteo[k]+' con este nombre)</span>':'')+'</div>'+
      '<div class="cli-sub">'+(c.telefono||'Sin teléfono')+(c.ciudad?' · '+c.ciudad:'')+'</div>'+
      '<div class="cli-stat">'+(c.numCompras||0)+' compras · '+mon(c.totalComprado||0)+((c.saldoPendiente||0)>0?' · <span style="color:#ff6b6b">Debe '+mon(c.saldoPendiente)+'</span>':'')+'</div></div>'+
    '</div>';
  }).join('') :
  hayBusqueda ?
    '<div class="empty"><div class="empty-icon">🔎</div><p>No se encontraron clientes con ese nombre.</p></div>' :
    '<div class="empty"><div class="empty-icon">👥</div><p>Aún no hay clientes registrados.<br>Toca el botón de arriba para agregar.</p></div>';
}

function pageClientes() {
  var d=db();
  var conSaldo=d.clientes.filter(function(c){return(c.saldoPendiente||0)>0;});
  var list=filtroCliSaldo ? conSaldo.slice().sort(function(a,b){return(b.saldoPendiente||0)-(a.saldoPendiente||0);})
    : d.clientes.slice().sort(function(a,b){return(b.numCompras||0)-(a.numCompras||0);});
  return '<div class="sec-title">Clientes ('+list.length+')</div>'+
    '<div style="margin-bottom:13px;display:flex;gap:8px;flex-wrap:wrap">'+
      '<button class="btn btn-p btn-sm" onclick="modalCliente()">+ Nuevo Cliente</button>'+
      '<button class="btn btn-sm '+(filtroCliSaldo?'btn-p':'btn-s')+'" onclick="toggleFiltroSaldo()">💰 Con saldo pendiente ('+conSaldo.length+')</button>'+
    '</div>'+
    '<div class="f"><input type="text" id="buscaCli" placeholder="Buscar por nombre o apellido..." oninput="filtrarClientes(this.value)" autocomplete="off"/></div>'+
    '<div id="cliListWrap">'+renderClienteList(list)+'</div>';
}

function toggleFiltroSaldo() { filtroCliSaldo=!filtroCliSaldo; ir('clientes'); }

function filtrarClientes(q) {
  var d=db();
  q=(q||'').trim().toLowerCase();
  var conSaldo=d.clientes.filter(function(c){return(c.saldoPendiente||0)>0;});
  var list=filtroCliSaldo ? conSaldo.slice().sort(function(a,b){return(b.saldoPendiente||0)-(a.saldoPendiente||0);})
    : d.clientes.slice().sort(function(a,b){return(b.numCompras||0)-(a.numCompras||0);});
  if(q){
    list=list.filter(function(c){return (c.nombre||'').toLowerCase().includes(q);});
  }
  document.getElementById('cliListWrap').innerHTML=renderClienteList(list,!!q);
}

function modalCliente(id) {
  var d=db();
  var c=id?d.clientes.find(function(x){return x.id===id;}):null;
  abrirModal(
    '<div class="modal-hd">'+(c?'Editar Cliente':'Nuevo Cliente')+'<button class="modal-x" onclick="cerrarModal()">×</button></div>'+
    '<div class="f"><label>Nombre completo *</label><input id="cNom" value="'+(c?c.nombre:'')+'" placeholder="Nombre y apellido"/></div>'+
    '<div class="f"><label>Teléfono / WhatsApp</label><input id="cTel" type="tel" value="'+(c?c.telefono||'':'')+'" placeholder="+57 300 000 0000"/></div>'+
    '<div class="f"><label>Ciudad / Barrio</label><input id="cCiu" value="'+(c?c.ciudad||'':'')+'" placeholder="Ej: Cali, Granada"/></div>'+
    '<div class="f"><label>Email</label><input id="cEma" type="email" value="'+(c?c.email||'':'')+'" placeholder="correo@gmail.com"/></div>'+
    '<div class="f"><label>Notas (talla habitual, gustos...)</label><textarea id="cNot">'+(c?c.notas||'':'')+'</textarea></div>'+
    '<div class="f"><label>Saldo pendiente (COP)</label><input id="cSaldo" type="number" value="'+(c?(c.saldoPendiente||0):0)+'" placeholder="0"/></div>'+
    '<button class="btn btn-p" onclick="guardarCliente(\''+(id||'')+'\')">'+(c?'Guardar cambios':'Registrar cliente')+'</button>'
  );
}

function guardarCliente(id) {
  var nom=(document.getElementById('cNom').value||'').trim();
  if(!nom){toast('El nombre es obligatorio',true);return;}
  var d=db();
  if(id){
    var c=d.clientes.find(function(x){return x.id===id;});
    if(c){c.nombre=nom;c.telefono=document.getElementById('cTel').value.trim();
      c.ciudad=document.getElementById('cCiu').value.trim();
      c.email=document.getElementById('cEma').value.trim();
      c.notas=document.getElementById('cNot').value.trim();c.saldoPendiente=parseInt(document.getElementById('cSaldo').value)||0;}
  } else {
    d.clientes.push({id:uid('CLI'),nombre:nom,
      telefono:document.getElementById('cTel').value.trim(),
      ciudad:document.getElementById('cCiu').value.trim(),
      email:document.getElementById('cEma').value.trim(),
      notas:document.getElementById('cNot').value.trim(),saldoPendiente:parseInt(document.getElementById('cSaldo').value)||0,
      numCompras:0,totalComprado:0,fechaRegistro:hoy()});
  }
  guardar(d);cerrarModal();toast(id?'✅ Cliente actualizado':'✅ Cliente registrado');ir('clientes');
}

function verCliente(id) {
  var d=db();
  var c=d.clientes.find(function(x){return x.id===id;});
  if(!c)return;
  var compras=d.ventas.filter(function(v){return v.clienteId===id;}).slice(-5).reverse();
  var hHtml=compras.length?compras.map(function(v){
    return '<div class="mov-row"><div><div>'+v.items.map(function(i){return i.nombre;}).join(', ')+'</div>'+
      '<div class="mov-lbl">'+fecStr(v.fecha)+' · '+v.hora+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<div class="mov-val mv-g">'+mon(v.total)+'</div>'+
        '<button class="btn-etq" onclick="eliminarVenta(\''+v.id+'\',\''+id+'\')" title="Eliminar venta">🗑</button>'+
      '</div></div>';
  }).join(''):'<p style="color:var(--sub);font-size:.8rem;padding:12px 0">Sin compras registradas.</p>';
  abrirModal(
    '<div class="modal-hd">'+c.nombre+'<button class="modal-x" onclick="cerrarModal()">×</button></div>'+
    '<div style="margin-bottom:14px;font-size:.83rem;line-height:1.8">'+
      (c.telefono?'📱 '+c.telefono+'<br>':'')+
      (c.ciudad?'📍 '+c.ciudad+'<br>':'')+
      (c.email?'✉️ '+c.email+'<br>':'')+
      (c.notas?'<span style="color:var(--sub);font-size:.76rem">'+c.notas+'</span>':'')+'</div>'+
    '<div class="grid2" style="margin-bottom:14px">'+
      '<div class="kpi"><div class="kpi-l">Compras</div><div class="kpi-v b">'+(c.numCompras||0)+'</div></div>'+
      '<div class="kpi"><div class="kpi-l">Total gastado</div><div class="kpi-v g" style="font-size:.95rem">'+mon(c.totalComprado||0)+'</div></div>'+
    '</div>'+
    '<div class="sec-title">Método de pago</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+
      ['Efectivo','Wompi','Crédito','Addi'].map(function(m){
        var activo=(c.metodosPago||[]).indexOf(m)>=0;
        return '<button class="btn btn-sm '+(activo?'btn-p':'btn-s')+'" onclick="toggleMetodoPago(\''+id+'\',\''+m+'\')">'+(activo?'✓ ':'')+m+'</button>';
      }).join('')+
    '</div>'+
    ((c.saldoPendiente||0)>0?'<div style="background:#3a1a1a;border:1px solid #ff6b6b;border-radius:10px;padding:10px 12px;margin-bottom:14px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<div><div style="font-size:.7rem;color:#ff9b9b">Saldo pendiente</div><div style="font-weight:700;color:#ff6b6b">'+mon(c.saldoPendiente)+'</div></div>'+
        '<button class="btn btn-s btn-sm" onclick="marcarPagado(\''+id+'\')">Marcar pagado</button>'+
      '</div>'+
      '<div style="display:flex;gap:8px">'+
        '<input id="cAbonoMonto" type="number" placeholder="Monto del abono" style="flex:1"/>'+
        '<button class="btn btn-p btn-sm" onclick="registrarAbono(\''+id+'\')">+ Abono</button>'+
      '</div>'+
    '</div>':'')+
    (c.abonos&&c.abonos.length?'<div class="sec-title">Abonos registrados</div>'+
      c.abonos.slice().reverse().map(function(a){
        return '<div class="mov-row"><div><div>Abono</div><div class="mov-lbl">'+fecStr(a.fecha)+'</div></div>'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<div class="mov-val mv-g">'+mon(a.monto)+'</div>'+
            '<button class="btn-etq" onclick="eliminarAbono(\''+id+'\',\''+a.id+'\')" title="Eliminar abono">🗑</button>'+
          '</div></div>';
      }).join('')
      :'')+
    '<div class="sec-title">Últimas compras</div>'+hHtml+
    '<div class="btn-row" style="margin-top:14px">'+
      '<button class="btn btn-s btn-sm" onclick="cerrarModal();setTimeout(function(){modalCliente(\''+id+'\');},50)">Editar</button>'+
      (c.telefono?'<a href="https://wa.me/'+c.telefono.replace(/\D/g,'')+'" target="_blank" style="flex:1;text-decoration:none"><button class="btn btn-p" style="width:100%">WhatsApp</button></a>':'')+
    '</div>'
  );
}

function toggleMetodoPago(id, metodo) {
  var d=db();
  var c=d.clientes.find(function(x){return x.id===id;});
  if(!c)return;
  c.metodosPago=c.metodosPago||[];
  var i=c.metodosPago.indexOf(metodo);
  if(i>=0) c.metodosPago.splice(i,1); else c.metodosPago.push(metodo);
  guardar(d);
  cerrarModal();
  setTimeout(function(){verCliente(id);},50);
}

function registrarAbono(id) {
  var d=db();
  var c=d.clientes.find(function(x){return x.id===id;});
  if(!c)return;
  var monto=parseInt(document.getElementById('cAbonoMonto').value)||0;
  if(monto<=0){toast('Ingresa un monto válido',true);return;}
  c.abonos=c.abonos||[];
  c.abonos.push({id:uid('ABN'),fecha:hoy(),monto:monto});
  c.saldoPendiente=Math.max(0,(c.saldoPendiente||0)-monto);
  guardar(d);
  toast('✅ Abono de '+mon(monto)+' registrado');
  cerrarModal();
  setTimeout(function(){verCliente(id);},50);
}

function eliminarAbono(id, abonoId) {
  var d=db();
  var c=d.clientes.find(function(x){return x.id===id;});
  if(!c)return;
  var idx=(c.abonos||[]).findIndex(function(a){return a.id===abonoId;});
  if(idx<0)return;
  c.saldoPendiente=(c.saldoPendiente||0)+c.abonos[idx].monto;
  c.abonos.splice(idx,1);
  guardar(d);
  toast('Abono eliminado');
  cerrarModal();
  setTimeout(function(){verCliente(id);},50);
}

function marcarPagado(id) {
  var d=db();
  var c=d.clientes.find(function(x){return x.id===id;});
  if(!c)return;
  c.saldoPendiente=0;
  guardar(d);
  toast('✅ Saldo marcado como pagado');
  cerrarModal();
  setTimeout(function(){verCliente(id);},50);
}

function eliminarVenta(id, clienteId) {
  if(!confirm('¿Eliminar esta venta? Se devuelve el stock y se resta del total del cliente.'))return;
  var d=db();
  var v=d.ventas.find(function(x){return x.id===id;});
  if(!v)return;
  v.items.forEach(function(it){
    var p=d.inventario.find(function(x){return x.id===it.prodId;});
    if(p) p.stock=(p.stock||0)+it.qty;
  });
  if(v.clienteId){
    var c=d.clientes.find(function(x){return x.id===v.clienteId;});
    if(c){c.numCompras=Math.max(0,(c.numCompras||0)-1);c.totalComprado=Math.max(0,(c.totalComprado||0)-v.total);}
  }
  d.ventas=d.ventas.filter(function(x){return x.id!==id;});
  guardar(d);
  toast('🗑 Venta eliminada');
  if(clienteId){cerrarModal();setTimeout(function(){verCliente(clienteId);},50);}
  else ir('contabilidad');
}

function eliminarGasto(id) {
  if(!confirm('¿Eliminar este gasto?'))return;
  var d=db();
  d.gastos=d.gastos.filter(function(x){return x.id!==id;});
  guardar(d);
  toast('🗑 Gasto eliminado');
  ir('contabilidad');
}

function pageContabilidad() {
  var d=db();
  var hoyStr=hoy();
  var ahora=new Date();
  function enPeriodo(f) {
    if(periodo==='hoy') return f===hoyStr;
    if(periodo==='semana') { var df=(ahora-new Date(f+'T00:00:00'))/864e5; return df>=0&&df<7; }
    if(periodo==='mes') return f.slice(0,7)===hoyStr.slice(0,7);
    return true;
  }
  var vFil=d.ventas.filter(function(v){return enPeriodo(v.fecha);});
  var gFil=d.gastos.filter(function(g){return enPeriodo(g.fecha);});
  var gFilNegocio=gFil.filter(function(g){return esGastoNegocio(g.categoria);});
  var gFilPersonal=gFil.filter(function(g){return !esGastoNegocio(g.categoria);});
  var totV=vFil.reduce(function(s,v){return s+v.total;},0);
  var totGNeg=gFilNegocio.reduce(function(s,g){return s+g.monto;},0);
  var totGPer=gFilPersonal.reduce(function(s,g){return s+g.monto;},0);
  var costo=vFil.reduce(function(s,v){
    return s+v.items.reduce(function(s2,it){
      var p=d.inventario.find(function(x){return x.id===it.prodId;});
      return s2+(p&&p.costo?p.costo*it.qty:0);
    },0);
  },0);
  var util=totV-totGNeg-costo;

  var tabs=['hoy','semana','mes','todo'].map(function(p){
    var lbl={hoy:'Hoy',semana:'7 días',mes:'Mes',todo:'Total'}[p];
    return '<button class="ptab'+(periodo===p?' active':'')+'" onclick="periodo=\''+p+'\';ir(\'contabilidad\')">'+lbl+'</button>';
  }).join('');

  var gMovs=filtroGasto==='Negocio'?gFilNegocio:filtroGasto==='Personal'?gFilPersonal:gFil;
  var movs=vFil.map(function(v){return{tipo:'V',id:v.id,f:v.fecha,h:v.hora||'',desc:v.items.map(function(i){return i.nombre;}).join(', '),val:v.total,met:v.metodo};})
    .concat(gMovs.map(function(g){return{tipo:'G',id:g.id,f:g.fecha,h:g.hora||'',desc:g.descripcion,val:g.monto,met:g.categoria,neg:esGastoNegocio(g.categoria)};}))
    .sort(function(a,b){return(b.f+b.h).localeCompare(a.f+a.h);}).slice(0,30);

  var movHtml=movs.length?movs.map(function(m){
    return '<div class="mov-row"><div><div>'+m.desc+(m.tipo==='G'?' <span style="font-size:.62rem;color:var(--sub)">'+(m.neg?'· Negocio':'· Personal')+'</span>':'')+'</div>'+
      '<div class="mov-lbl">'+(m.h?m.h+' · ':'')+fecStr(m.f)+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<div style="text-align:right"><div class="mov-val '+(m.tipo==='G'?'mv-r':'mv-g')+'">'+(m.tipo==='G'?'-':'')+mon(m.val)+'</div>'+
        '<span class="mov-met"'+(m.tipo==='V'?' style="cursor:pointer;text-decoration:underline dotted" onclick="editarMetodoVenta(\''+m.id+'\')" title="Tocar para corregir método de pago"':'')+'>'+m.met+'</span></div>'+
        '<button class="btn-etq" onclick="'+(m.tipo==='G'?'eliminarGasto':'eliminarVenta')+'(\''+m.id+'\')" title="Eliminar">🗑</button>'+
      '</div></div>';
  }).join(''):'<div class="empty"><p>Sin movimientos en este período.</p></div>';

  var filGasto=['Todos','Negocio','Personal'].map(function(f){
    return '<button class="fil-btn'+(filtroGasto===f?' active':'')+'" onclick="filtroGasto=\''+f+'\';ir(\'contabilidad\')">'+f+'</button>';
  }).join('');

  return '<div class="sec-title">Contabilidad</div>'+
    '<div class="card" id="respaldoNubeWrap" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px">'+
      htmlEstadoRespaldo()+
    '</div>'+
    '<div class="card" id="pedidosPendientesWrap" style="margin-bottom:14px">'+
      '<div class="sec-title" style="margin:0 0 8px">📦 Pedidos pendientes de guía</div>'+
      '<p style="color:var(--sub);font-size:.78rem">Cargando...</p>'+
    '</div>'+
    '<div class="period-tabs">'+tabs+'</div>'+
    '<div class="kpis">'+
      '<div class="kpi"><div class="kpi-l">Ventas ('+vFil.length+')</div><div class="kpi-v g">'+mon(totV)+'</div></div>'+
      '<div class="kpi"><div class="kpi-l">Utilidad Negocio</div><div class="kpi-v o">'+mon(util)+'</div></div>'+
      '<div class="kpi"><div class="kpi-l">Gastos Negocio</div><div class="kpi-v r">'+mon(totGNeg)+'</div></div>'+
      '<div class="kpi"><div class="kpi-l">Gastos Personales</div><div class="kpi-v r">'+mon(totGPer)+'</div></div>'+
      '<div class="kpi"><div class="kpi-l">Transacciones</div><div class="kpi-v b">'+(vFil.length+gFil.length)+'</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:13px">'+
      '<button class="btn btn-p btn-sm" onclick="modalGasto()">+ Registrar Gasto</button>'+
      '<button class="btn btn-s btn-sm" onclick="exportar()">⬇ Exportar CSV</button>'+
    '</div>'+
    '<div class="filtros" style="margin-bottom:10px">'+filGasto+'</div>'+
    '<div class="card">'+movHtml+'</div>';
}

function editarMetodoVenta(id) {
  var d=db();
  var v=d.ventas.find(function(x){return x.id===id;});
  if(!v)return;
  var metodos=['Efectivo','Transferencia / Nequi','Tarjeta','Wompi','Crédito','Addi'];
  abrirModal(
    '<div class="modal-hd">Método de pago<button class="modal-x" onclick="cerrarModal()">×</button></div>'+
    '<div class="f"><label>Método</label><select id="mVenMet">'+
      metodos.map(function(m){return '<option'+(v.metodo===m?' selected':'')+'>'+m+'</option>';}).join('')+
    '</select></div>'+
    '<div class="btn-row"><button class="btn btn-p" style="width:100%" onclick="guardarMetodoVenta(\''+id+'\')">Guardar</button></div>'
  );
}

function guardarMetodoVenta(id) {
  var d=db();
  var v=d.ventas.find(function(x){return x.id===id;});
  if(!v)return;
  var metodoAnterior=v.metodo;
  var metodoNuevo=document.getElementById('mVenMet').value;
  v.metodo=metodoNuevo;
  if(v.clienteId && metodoAnterior!==metodoNuevo){
    var c=d.clientes.find(function(x){return x.id===v.clienteId;});
    if(c){
      if(metodoAnterior==='Crédito') c.saldoPendiente=Math.max(0,(c.saldoPendiente||0)-v.total);
      if(metodoNuevo==='Crédito') c.saldoPendiente=(c.saldoPendiente||0)+v.total;
    }
  }
  guardar(d);
  toast('✅ Método de pago actualizado');
  cerrarModal();
  ir('contabilidad');
}

function htmlEstadoRespaldo() {
  var ts = parseInt(localStorage.getItem('ckr_g2_ultimo_sync')||'0');
  var texto;
  if (!ts) {
    texto = 'Aún no se ha sincronizado en la nube';
  } else {
    var minutos = Math.floor((Date.now()-ts)/60000);
    texto = minutos < 1 ? 'Último respaldo: hace unos segundos' :
      minutos < 60 ? 'Último respaldo: hace '+minutos+' min' :
      'Último respaldo: hace '+Math.floor(minutos/60)+' h';
  }
  return '<div>☁️ <span id="respaldoTexto" style="color:var(--sub);font-size:.78rem">'+texto+'</span></div>'+
    '<button class="btn btn-s btn-sm" onclick="sincronizarAhora(this)">Sincronizar ahora</button>';
}

function sincronizarAhora(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Sincronizando...'; }
  fetch(CKR_STOCK_WEBHOOK, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ accion: 'guardar_backup', datos: JSON.stringify(db()) }).toString()
  }).then(function(){
    localStorage.setItem('ckr_g2_ultimo_sync', Date.now().toString());
    var wrap = document.getElementById('respaldoNubeWrap');
    if (wrap) wrap.innerHTML = htmlEstadoRespaldo();
    toast('☁️ Respaldo actualizado');
  }).catch(function(){
    toast('No se pudo sincronizar (revisa tu conexión)', true);
    if (btn) { btn.disabled = false; btn.textContent = 'Sincronizar ahora'; }
  });
}

function cargarPedidosPendientes() {
  var wrap = document.getElementById('pedidosPendientesWrap');
  if (!wrap) return;
  fetch('https://ckrnow.com/pedidos.json?nocache=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      var wrapNow = document.getElementById('pedidosPendientesWrap');
      if (!wrapNow) return; // la propietaria pudo haber cambiado de pestaña mientras cargaba
      var pendientes = (data.pedidos || []).filter(function(p){ return p.estado === 'pendiente_guia'; });
      if (!pendientes.length) {
        wrapNow.innerHTML = '<div class="sec-title" style="margin:0 0 8px">📦 Pedidos pendientes de guía</div>'+
          '<p style="color:var(--sub);font-size:.78rem">No hay pedidos de Addi/WhatsApp esperando guía.</p>';
        return;
      }
      wrapNow.innerHTML = '<div class="sec-title" style="margin:0 0 8px">📦 Pedidos pendientes de guía ('+pendientes.length+')</div>'+
        pendientes.map(function(p){
          return '<div class="mov-row"><div><div>'+p.cliente.nombre+' · '+(p.metodo||'')+'</div>'+
            '<div class="mov-lbl">'+p.cliente.dir+', '+p.cliente.ciudad+' · '+mon(p.total)+'</div></div>'+
            '<button class="btn btn-p btn-sm" onclick="crearGuiaManual(\''+p.id+'\',this)">Crear guía</button>'+
          '</div>';
        }).join('');
    })
    .catch(function(){
      var wrapErr = document.getElementById('pedidosPendientesWrap');
      if (wrapErr) wrapErr.innerHTML = '<div class="sec-title" style="margin:0 0 8px">📦 Pedidos pendientes de guía</div>'+
        '<p style="color:var(--sub);font-size:.78rem">No se pudo cargar (revisa tu conexión).</p>';
    });
}

function crearGuiaManual(pedidoId, btn) {
  if (!CKR_STOCK_WEBHOOK) { toast('Falta configurar CKR_STOCK_WEBHOOK', true); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Creando...'; }
  fetch(CKR_STOCK_WEBHOOK, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ accion: 'marcar_guia_creada_manual', pedidoId: pedidoId }).toString()
  }).then(function(){
    toast('✅ Creando guía — revisa el correo del cliente en unos segundos');
    setTimeout(cargarPedidosPendientes, 4000);
  }).catch(function(){
    toast('Error al conectar con el backend', true);
    if (btn) { btn.disabled = false; btn.textContent = 'Crear guía'; }
  });
}

function modalGasto() {
  var gruposCat={'Negocio CKR':CAT_NEGOCIO,'Personal':CAT_PERSONAL};
  var catOpts=Object.keys(gruposCat).map(function(g){
    return '<optgroup label="'+g+'">'+gruposCat[g].map(function(c){return '<option>'+c+'</option>';}).join('')+'</optgroup>';

  abrirModal(

function guardarGasto() {
  var des=(document.getElementById('gDes').value||'').trim();
  var mon2=parseFloat(document.getElementById('gMon').value);
  if(!des||!mon2){toast('Descripción y monto obligatorios',true);return;}
  var d=db();
  d.gastos.push({id:uid('GAS'),categoria:document.getElementById('gCat').value,
    descripcion:des,monto:mon2,fecha:document.getElementById('gFec').value,hora:hora()});
  guardar(d);cerrarModal();toast('✅ Gasto registrado');ir('contabilidad');
}

function exportar() {
  var d=db();
  var csv='﻿Tipo,Fecha,Hora,Descripción,Monto,Método\n';
  d.ventas.forEach(function(v){
    csv+='"Venta","'+v.fecha+'","'+v.hora+'","'+v.items.map(function(i){return i.nombre;}).join(' + ')+'",'+v.total+',"'+v.metodo+'"\n';
  });
  d.gastos.forEach(function(g){
    csv+='"Gasto","'+g.fecha+'","'+(g.hora||'')+'","'+g.descripcion+'",-'+g.monto+',"'+g.categoria+'"\n';
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='CKR_Contabilidad_'+hoy()+'.csv';a.click();
  toast('✅ Archivo exportado');
}

function activarEscaneo() {
  abrirModal(
    '<div class="modal-hd">📷 Escanear Etiqueta'+
    '<button class="modal-x" onclick="cerrarModal()">×</button></div>'+
    '<div id="qrReader" style="width:100%;"></div>'+
    '<p style="text-align:center;color:var(--sub);font-size:.78rem;margin-top:12px;">'+
    'Apunta la cámara trasera al QR de la etiqueta</p>'
  );
  setTimeout(function(){
    if(typeof Html5Qrcode==='undefined'){
      toast('Librería de cámara no cargó. Revisa internet.',true);
      cerrarModal();return;
    }
    var scanner=new Html5Qrcode('qrReader');
    window._qrScanner=scanner;
    scanner.start(
      {facingMode:'environment'},
      {fps:10,qrbox:{width:220,height:220}},
      function(texto){
        if(texto.startsWith('CKRPRD:')){
          var id=texto.replace('CKRPRD:','');
          cerrarModal();
          addCarrito(id);
          toast('✅ Producto escaneado y agregado');
        }
      },
      function(){}
    ).catch(function(e){
      toast('No se pudo acceder a la cámara',true);
      cerrarModal();
    });
  },350);
}
</script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</body>
